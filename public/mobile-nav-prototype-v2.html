<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Raagam ERP — Dynamic Mobile Nav V2 (Claude design)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          primary: "#7C3AED",
          "primary-dark": "#6D28D9",
          "primary-deep": "#5B21B6",
          "primary-tint": "#F4F0FE",
          ink: "#15171A",
          muted: "#71767F",
          border: "#E9EBEF",
        },
        fontFamily: { sans: ["Inter", "sans-serif"], mono: ["JetBrains Mono", "monospace"] },
        boxShadow: {
          fab: "0 8px 24px -4px rgba(124,58,237,.45), 0 4px 10px -2px rgba(124,58,237,.35)",
          bar: "0 -2px 10px rgba(20,23,30,.04), 0 12px 30px -10px rgba(20,23,30,.18)",
          card: "0 1px 2px rgba(20,23,30,.04)",
          dial: "0 6px 18px -4px rgba(20,23,30,.22)",
        },
      },
    },
  };
</script>
<style>
  body { font-family: Inter, sans-serif; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  .fab-item { transition: opacity .22s cubic-bezier(.2,.9,.3,1.3), transform .22s cubic-bezier(.2,.9,.3,1.3); }
  .fab-closed .fab-item { opacity: 0; transform: translateY(16px) scale(.85); pointer-events: none; }
  .fab-open   .fab-item { opacity: 1; transform: translateY(0) scale(1); }
  #fabIcon { transition: transform .25s cubic-bezier(.2,.8,.2,1); }
  .fab-open #fabIcon { transform: rotate(135deg); }
  .scrim { transition: opacity .25s ease, backdrop-filter .25s ease; }
  .sheet { transition: transform .32s cubic-bezier(.2,.85,.25,1); }
  .pill { transition: transform .12s ease, background-color .18s ease, color .18s ease, box-shadow .18s ease; }
  .pill:active { transform: scale(.94); }
  .canvas-bg { background:
    radial-gradient(120% 60% at 50% -10%, #F6F2FF 0%, rgba(246,242,255,0) 45%), #F7F8FA; }
</style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center py-8 px-4">

  <div class="mb-6 text-center max-w-md">
    <h1 class="text-lg font-bold text-slate-800">Raagam ERP — Dynamic Mobile Nav <span class="text-primary">V2</span></h1>
    <p class="text-sm text-slate-500 mt-1">Floating frosted bar · module-aware · gradient FAB speed-dial.
      Tap the <b>module chip</b> (bottom-left) to switch · tap <b>pills</b> · tap the <b>＋</b>.</p>
  </div>

  <!-- Phone frame -->
  <div class="relative w-[390px] h-[824px] canvas-bg rounded-[2.4rem] border-[11px] border-slate-900 shadow-2xl overflow-hidden">

    <!-- Top app bar -->
    <div class="absolute top-0 inset-x-0 h-14 bg-white/70 backdrop-blur-xl border-b border-border flex items-center justify-between px-4 z-20">
      <div class="flex items-center gap-2.5">
        <div class="h-7 w-7 rounded-lg bg-gradient-to-br from-primary to-primary-deep text-white grid place-items-center text-sm font-bold shadow-sm">R</div>
        <div class="leading-none">
          <div class="text-[10px] font-medium text-muted">Raagam ERP</div>
          <div id="topbarTitle" class="text-[13px] font-semibold text-ink mt-0.5">Orders</div>
        </div>
      </div>
      <div class="flex items-center gap-3 text-muted">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.4-1.4A2 2 0 0118 14.2V11a6 6 0 10-12 0v3.2c0 .5-.2 1-.6 1.4L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
        <div class="h-8 w-8 rounded-full bg-gradient-to-br from-primary-tint to-white ring-1 ring-border text-primary grid place-items-center text-xs font-bold">RS</div>
      </div>
    </div>

    <!-- Scrollable content -->
    <div class="absolute top-14 bottom-[92px] inset-x-0 overflow-y-auto no-scrollbar px-4 py-4">
      <div class="mb-4 flex items-end justify-between">
        <div>
          <h2 id="pageTitle" class="text-[22px] font-bold tracking-tight text-ink">All Orders</h2>
          <p id="pageSub" class="text-[13px] text-muted mt-0.5">Sales order management</p>
        </div>
        <div class="h-9 w-9 rounded-xl bg-white shadow-card border border-border grid place-items-center text-muted">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4 6h16M7 12h10M10 18h4"/></svg>
        </div>
      </div>
      <div id="cardList" class="space-y-2.5"></div>
    </div>

    <!-- Scrim -->
    <div id="scrim" class="scrim absolute inset-0 bg-slate-900/30 opacity-0 pointer-events-none z-30" style="backdrop-filter:blur(0px)"></div>

    <!-- FAB + speed dial -->
    <div id="fabWrap" class="fab-closed absolute right-5 bottom-[108px] z-40 flex flex-col items-end gap-3">
      <div id="fabItems" class="flex flex-col items-end gap-2.5"></div>
      <button id="fab" class="h-15 w-15 h-[60px] w-[60px] rounded-2xl bg-gradient-to-br from-primary to-primary-deep text-white grid place-items-center shadow-fab active:scale-95 transition-transform">
        <svg id="fabIcon" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>

    <!-- Floating bottom nav -->
    <div class="absolute bottom-4 inset-x-3 h-16 z-30">
      <div class="h-full rounded-2xl bg-white/80 backdrop-blur-xl border border-white/60 shadow-bar flex items-stretch overflow-hidden">
        <!-- Module chip (identity + switcher) -->
        <button id="modulesBtn" class="shrink-0 flex items-center gap-2 pl-3 pr-3 border-r border-border/70 active:bg-slate-50">
          <span id="modIcon" class="h-9 w-9 rounded-xl bg-primary-tint text-primary grid place-items-center"></span>
          <svg width="14" height="14" fill="none" stroke="#9AA0A8" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M7 9l5 5 5-5"/></svg>
        </button>
        <!-- Sub-module pills -->
        <div id="pillRow" class="flex-1 flex items-center gap-2 overflow-x-auto no-scrollbar px-3"></div>
      </div>
    </div>

    <!-- Module switcher sheet -->
    <div id="moduleSheet" class="sheet absolute inset-x-0 bottom-0 z-50 translate-y-full bg-white rounded-t-3xl shadow-2xl max-h-[74%] overflow-y-auto no-scrollbar p-5 pb-7">
      <div class="mx-auto mb-4 h-1.5 w-11 rounded-full bg-border"></div>
      <div class="flex items-center justify-between mb-4">
        <div>
          <h3 class="text-base font-bold text-ink">Modules</h3>
          <p class="text-xs text-muted mt-0.5">Jump to any part of the ERP</p>
        </div>
        <button id="sheetClose" class="h-9 w-9 grid place-items-center rounded-xl bg-slate-100 text-muted active:scale-95 transition-transform">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
      <div id="moduleGrid" class="grid grid-cols-3 gap-2.5"></div>
    </div>

  </div>

<script>
  // ── Data model (mirrors nav.ts: module → sub-modules → actions) ────────
  const MODULES = {
    orders: { label: "Orders", icon: "clipboard", subs: [
      { label: "All Orders",            actions: ["New Order", "Import Orders", "Export List"] },
      { label: "Colour Cards",          actions: ["New Colour Card"] },
      { label: "Internal Work Orders",  actions: ["New Work Order"] },
      { label: "Advised Items",         actions: ["New Advised Item", "Bulk Upload"] },
      { label: "Packing Advice",        actions: ["New Packing Advice"] },
      { label: "TA Masters",            actions: ["New TA Master"] },
    ]},
    planning: { label: "Planning", icon: "layers", subs: [
      { label: "Bill of Materials", actions: ["New BOM", "Import BOM"] },
      { label: "Budgets",           actions: ["New Budget"] },
      { label: "Shortages",         actions: ["Recalculate", "Export"] },
      { label: "Shipment Plans",    actions: ["New Shipment Plan"] },
    ]},
    purchase: { label: "Purchase", icon: "package", subs: [
      { label: "Purchase Orders",   actions: ["New PO", "Import"] },
      { label: "RFQ",               actions: ["New RFQ"] },
      { label: "Goods Receipts",    actions: ["New GRN"] },
      { label: "Delivery Challans", actions: ["New DC"] },
      { label: "Vendors",           actions: ["New Vendor"] },
    ]},
    stores: { label: "Stores", icon: "warehouse", subs: [
      { label: "Opening Stock",  actions: ["New Opening Stock", "Import"] },
      { label: "Requisitions",   actions: ["New MRS"] },
      { label: "Vendor Returns", actions: ["New Return"] },
      { label: "CSP Receipts",   actions: ["New CSP Receipt"] },
    ]},
    hr: { label: "HR & Payroll", icon: "users", subs: [
      { label: "Workers",      actions: ["New Worker", "Bulk Import"] },
      { label: "Attendance",   actions: ["Mark Attendance"] },
      { label: "Piece Records",actions: ["New Piece Record"] },
      { label: "Payroll Runs", actions: ["New Payroll Run"] },
      { label: "Payslips",     actions: ["Generate"] },
    ]},
    finance: { label: "Finance", icon: "landmark", subs: [
      { label: "Payables",     actions: ["New Bill"] },
      { label: "Receivables",  actions: ["New Invoice", "Record Receipt"] },
      { label: "Ledger",       actions: ["New Journal"] },
      { label: "Shipment P&L", actions: ["Export"] },
    ]},
  };

  const ICONS = {
    clipboard:'<path d="M9 5h6M9 5a2 2 0 00-2 2v0a2 2 0 002 2h6a2 2 0 002-2v0a2 2 0 00-2-2M9 5V4a1 1 0 011-1h4a1 1 0 011 1v1M6 9h12v10a2 2 0 01-2 2H8a2 2 0 01-2-2V9z"/>',
    layers:'<path d="M12 3l9 5-9 5-9-5 9-5zM3 13l9 5 9-5"/>',
    package:'<path d="M21 8l-9-5-9 5 9 5 9-5zM3 8v8l9 5 9-5V8M12 13v8"/>',
    warehouse:'<path d="M3 21V9l9-5 9 5v12M7 21v-6h10v6"/>',
    users:'<path d="M17 20v-2a4 4 0 00-4-4H7a4 4 0 00-4 4v2M10 8a3 3 0 11-6 0 3 3 0 016 0zM21 20v-2a4 4 0 00-3-3.9M17 4.1A4 4 0 0117 12"/>',
    landmark:'<path d="M4 10h16M6 10v8M10 10v8M14 10v8M18 10v8M3 21h18M12 3l8 5H4l8-5z"/>',
  };
  const icon = (n, s=20) => '<svg width="'+s+'" height="'+s+'" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">'+(ICONS[n]||"")+'</svg>';

  const STATUS = [
    ["Confirmed","#2563EB","#EAF1FE"], ["In Production","#B45309","#FCF1E1"],
    ["Shipped","#15803D","#E7F6EC"], ["Closed","#5B6470","#EEF0F3"],
  ];

  const state = { module: "orders", sub: 0, fabOpen: false, sheetOpen: false };
  const $ = (id) => document.getElementById(id);

  function renderPills() {
    const subs = MODULES[state.module].subs;
    $("pillRow").innerHTML = subs.map((s,i) => {
      const a = i === state.sub;
      return '<button data-sub="'+i+'" class="pill shrink-0 whitespace-nowrap rounded-xl px-3.5 py-2 text-xs font-semibold '+
        (a ? "bg-gradient-to-br from-primary to-primary-dark text-white shadow-[0_4px_12px_-2px_rgba(124,58,237,.5)]" : "text-muted hover:bg-slate-100") + '">'+s.label+'</button>';
    }).join("");
    $("pillRow").querySelectorAll("button").forEach(b => b.onclick = () => {
      state.sub = +b.dataset.sub; state.fabOpen = false; render();
      b.scrollIntoView({ behavior:"smooth", inline:"center", block:"nearest" });
    });
  }

  function renderFab() {
    const acts = MODULES[state.module].subs[state.sub].actions;
    $("fabItems").innerHTML = acts.map((a,i) => {
      const p = i === 0;
      return '<div class="fab-item flex items-center gap-2.5" style="transition-delay:'+(state.fabOpen?(acts.length-1-i)*45:0)+'ms">'+
        '<span class="rounded-xl bg-white px-3 py-2 text-xs font-semibold text-ink shadow-dial">'+a+'</span>'+
        '<span class="h-12 w-12 rounded-2xl grid place-items-center shadow-dial '+(p?"bg-gradient-to-br from-primary to-primary-deep text-white":"bg-white text-primary")+'">'+
          (p ? '<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 5v14M5 12h14"/></svg>'
             : '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 5v14M5 12h14"/></svg>')+
        '</span></div>';
    }).join("");
    $("fabWrap").className = (state.fabOpen ? "fab-open" : "fab-closed") + " absolute right-5 bottom-[108px] z-40 flex flex-col items-end gap-3";
  }

  function renderContent() {
    const m = MODULES[state.module], sub = m.subs[state.sub];
    $("topbarTitle").textContent = m.label;
    $("modIcon").innerHTML = icon(m.icon, 20);
    $("pageTitle").textContent = sub.label;
    $("pageSub").textContent = m.label + " · " + sub.actions.length + " quick action" + (sub.actions.length>1?"s":"");
    let rows = "";
    for (let i=0;i<6;i++) {
      const st = STATUS[i % STATUS.length];
      const code = state.module.slice(0,3).toUpperCase()+"-"+(2400+i*7);
      rows += '<div class="rounded-2xl bg-white border border-border shadow-card p-3.5 flex gap-3 active:scale-[.99] transition-transform">'+
        '<span class="mt-0.5 h-9 w-1.5 rounded-full shrink-0" style="background:'+st[1]+'"></span>'+
        '<div class="flex-1 min-w-0">'+
          '<div class="flex items-center justify-between">'+
            '<span class="font-mono text-xs font-semibold text-primary">'+code+'</span>'+
            '<span class="rounded-full px-2 py-0.5 text-[10px] font-semibold" style="color:'+st[1]+';background:'+st[2]+'">'+st[0]+'</span>'+
          '</div>'+
          '<div class="mt-1 text-sm font-semibold text-ink truncate">'+sub.label+' record '+(i+1)+'</div>'+
          '<div class="mt-0.5 flex items-center justify-between text-xs text-muted">'+
            '<span>Global Apparel Co.</span><span class="font-mono font-medium">'+(1200-i*130)+' pcs</span>'+
          '</div>'+
        '</div></div>';
    }
    $("cardList").innerHTML = rows;
  }

  function renderSheet() {
    $("moduleGrid").innerHTML = Object.entries(MODULES).map(([k,m]) => {
      const a = k === state.module;
      return '<button data-mod="'+k+'" class="flex flex-col items-center gap-2 rounded-2xl border p-3.5 active:scale-95 transition-transform '+
        (a ? "border-primary bg-primary-tint text-primary" : "border-border text-muted hover:bg-slate-50") + '">'+
        '<span class="h-10 w-10 rounded-xl grid place-items-center '+(a?"bg-white":"bg-slate-100")+'">'+icon(m.icon,22)+'</span>'+
        '<span class="text-[11px] font-semibold text-center leading-tight text-ink">'+m.label+'</span></button>';
    }).join("");
    $("moduleGrid").querySelectorAll("button").forEach(b => b.onclick = () => {
      state.module = b.dataset.mod; state.sub = 0; state.sheetOpen = false; state.fabOpen = false; render();
    });
  }

  function renderOverlays() {
    const open = state.fabOpen || state.sheetOpen;
    $("scrim").style.opacity = open ? "1" : "0";
    $("scrim").style.pointerEvents = open ? "auto" : "none";
    $("scrim").style.backdropFilter = open ? "blur(2px)" : "blur(0px)";
    $("moduleSheet").style.transform = state.sheetOpen ? "translateY(0)" : "translateY(100%)";
  }

  function render(){ renderPills(); renderFab(); renderContent(); renderSheet(); renderOverlays(); }

  $("fab").onclick = () => { state.fabOpen = !state.fabOpen; state.sheetOpen = false; render(); };
  $("modulesBtn").onclick = () => { state.sheetOpen = true; state.fabOpen = false; render(); };
  $("sheetClose").onclick = () => { state.sheetOpen = false; render(); };
  $("scrim").onclick = () => { state.fabOpen = false; state.sheetOpen = false; render(); };

  render();
</script>
</body>
</html>
