<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Raagam ERP — Dynamic Mobile Nav Prototype (Claude design)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          primary: "#7C3AED",
          "primary-dark": "#6D28D9",
          "primary-tint": "#F3EEFE",
          surface: "#FFFFFF",
          canvas: "#F7F8FA",
          border: "#E6E8EC",
          ink: "#1A1C1E",
          muted: "#6B7280",
        },
        fontFamily: { sans: ["Inter", "sans-serif"], mono: ["JetBrains Mono", "monospace"] },
      },
    },
  };
</script>
<style>
  body { font-family: Inter, sans-serif; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  /* speed-dial + scrim transitions */
  .fab-item { transition: opacity .18s ease, transform .18s ease; }
  .fab-closed .fab-item { opacity: 0; transform: translateY(12px) scale(.9); pointer-events: none; }
  .fab-open .fab-item { opacity: 1; transform: translateY(0) scale(1); }
  .scrim { transition: opacity .2s ease; }
  .sheet { transition: transform .28s cubic-bezier(.2,.8,.2,1); }
</style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center py-8 px-4">

  <div class="mb-6 text-center max-w-md">
    <h1 class="text-lg font-bold text-slate-800">Raagam ERP — Dynamic Mobile Nav (Claude design)</h1>
    <p class="text-sm text-slate-500 mt-1">
      Tap <b>Modules</b> (bottom-left) to switch module → the pills change.
      Tap a <b>pill</b> to change sub-module → the FAB actions change.
      Tap the <b>＋ FAB</b> to open the action speed-dial.
    </p>
  </div>

  <!-- Phone frame -->
  <div class="relative w-[390px] h-[820px] bg-canvas rounded-[2.2rem] border-[10px] border-slate-900 shadow-2xl overflow-hidden">

    <!-- Top app bar -->
    <div class="absolute top-0 inset-x-0 h-14 bg-surface border-b border-border flex items-center justify-between px-4 z-20">
      <div class="flex items-center gap-2">
        <div class="h-7 w-7 rounded-md bg-primary text-white grid place-items-center text-sm font-bold">R</div>
        <span id="topbarTitle" class="text-sm font-semibold text-ink">Orders</span>
      </div>
      <div class="flex items-center gap-3 text-muted">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.4-1.4A2 2 0 0118 14.2V11a6 6 0 10-12 0v3.2c0 .5-.2 1-.6 1.4L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
        <div class="h-7 w-7 rounded-full bg-primary-tint text-primary grid place-items-center text-xs font-semibold">RS</div>
      </div>
    </div>

    <!-- Scrollable content -->
    <div class="absolute top-14 bottom-[68px] inset-x-0 overflow-y-auto no-scrollbar px-4 py-4">
      <div class="mb-3">
        <h2 id="pageTitle" class="text-xl font-semibold text-ink">All Orders</h2>
        <p id="pageSub" class="text-sm text-muted">Sales order management</p>
      </div>
      <div id="cardList" class="space-y-2.5"></div>
    </div>

    <!-- Scrim (for FAB menu + module sheet) -->
    <div id="scrim" class="scrim absolute inset-0 bg-black/40 opacity-0 pointer-events-none z-30"></div>

    <!-- FAB + speed dial -->
    <div id="fabWrap" class="fab-closed absolute right-4 bottom-[84px] z-40 flex flex-col items-end gap-2.5">
      <div id="fabItems" class="flex flex-col items-end gap-2.5"></div>
      <button id="fab" class="h-14 w-14 rounded-full bg-primary text-white grid place-items-center shadow-lg shadow-primary/30 active:scale-95 transition-transform">
        <svg id="fabIcon" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>

    <!-- Bottom nav: fixed Modules button + scrollable sub-module pills -->
    <div class="absolute bottom-0 inset-x-0 h-[68px] bg-surface border-t border-border flex items-stretch z-30">
      <button id="modulesBtn" class="shrink-0 w-[64px] flex flex-col items-center justify-center gap-0.5 border-r border-border text-muted active:bg-slate-50">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        <span class="text-[10px] font-medium">Modules</span>
      </button>
      <div id="pillRow" class="flex-1 flex items-center gap-2 overflow-x-auto no-scrollbar px-3"></div>
    </div>

    <!-- Modules switcher bottom sheet -->
    <div id="moduleSheet" class="sheet absolute inset-x-0 bottom-0 z-50 translate-y-full bg-surface rounded-t-2xl border-t border-border shadow-2xl max-h-[70%] overflow-y-auto no-scrollbar p-4">
      <div class="mx-auto mb-3 h-1 w-10 rounded-full bg-border"></div>
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-semibold text-ink">Switch module</h3>
        <button id="sheetClose" class="h-8 w-8 grid place-items-center rounded-md text-muted active:bg-slate-100">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
      <div id="moduleGrid" class="grid grid-cols-3 gap-2"></div>
    </div>

  </div>

<script>
  // ── Data model (mirrors what will live in nav.ts) ─────────────────────
  // module → sub-modules → actions(verbs shown in the FAB speed-dial)
  const MODULES = {
    orders: {
      label: "Orders", icon: "clipboard",
      subs: [
        { label: "All Orders",          actions: ["New Order", "Import Orders", "Export List"] },
        { label: "Colour Cards",        actions: ["New Colour Card"] },
        { label: "Internal Work Orders",actions: ["New Work Order"] },
        { label: "Advised Items",       actions: ["New Advised Item", "Bulk Upload"] },
        { label: "Packing Advice",      actions: ["New Packing Advice"] },
        { label: "TA Masters",          actions: ["New TA Master"] },
      ],
    },
    planning: {
      label: "Planning", icon: "layers",
      subs: [
        { label: "Bill of Materials", actions: ["New BOM", "Import BOM"] },
        { label: "Budgets",           actions: ["New Budget"] },
        { label: "Shortages",         actions: ["Recalculate", "Export"] },
        { label: "Shipment Plans",    actions: ["New Shipment Plan"] },
      ],
    },
    purchase: {
      label: "Purchase", icon: "package",
      subs: [
        { label: "Purchase Orders",  actions: ["New PO", "Import"] },
        { label: "RFQ",              actions: ["New RFQ"] },
        { label: "Goods Receipts",   actions: ["New GRN"] },
        { label: "Delivery Challans",actions: ["New DC"] },
        { label: "Vendors",          actions: ["New Vendor"] },
      ],
    },
    stores: {
      label: "Stores", icon: "warehouse",
      subs: [
        { label: "Opening Stock",  actions: ["New Opening Stock", "Import"] },
        { label: "Requisitions",   actions: ["New MRS"] },
        { label: "Vendor Returns", actions: ["New Return"] },
        { label: "CSP Receipts",   actions: ["New CSP Receipt"] },
      ],
    },
    hr: {
      label: "HR & Payroll", icon: "users",
      subs: [
        { label: "Workers",     actions: ["New Worker", "Bulk Import"] },
        { label: "Attendance",  actions: ["Mark Attendance"] },
        { label: "Piece Records",actions: ["New Piece Record"] },
        { label: "Payroll Runs", actions: ["New Payroll Run"] },
        { label: "Payslips",    actions: ["Generate"] },
      ],
    },
    finance: {
      label: "Finance", icon: "landmark",
      subs: [
        { label: "Payables",    actions: ["New Bill"] },
        { label: "Receivables", actions: ["New Invoice", "Record Receipt"] },
        { label: "Ledger",      actions: ["New Journal"] },
        { label: "Shipment P&L",actions: ["Export"] },
      ],
    },
  };

  const ICONS = {
    clipboard:'<path d="M9 5h6M9 5a2 2 0 00-2 2v0a2 2 0 002 2h6a2 2 0 002-2v0a2 2 0 00-2-2M9 5V4a1 1 0 011-1h4a1 1 0 011 1v1M6 9h12v10a2 2 0 01-2 2H8a2 2 0 01-2-2V9z"/>',
    layers:'<path d="M12 3l9 5-9 5-9-5 9-5zM3 13l9 5 9-5"/>',
    package:'<path d="M21 8l-9-5-9 5 9 5 9-5zM3 8v8l9 5 9-5V8M12 13v8"/>',
    warehouse:'<path d="M3 21V9l9-5 9 5v12M7 21v-6h10v6"/>',
    users:'<path d="M17 20v-2a4 4 0 00-4-4H7a4 4 0 00-4 4v2M10 8a3 3 0 11-6 0 3 3 0 016 0zM21 20v-2a4 4 0 00-3-3.9M17 4.1A4 4 0 0117 12"/>',
    landmark:'<path d="M4 10h16M6 10v8M10 10v8M14 10v8M18 10v8M3 21h18M12 3l8 5H4l8-5z"/>',
  };
  function icon(name, cls="") {
    return '<svg class="'+cls+'" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">'+(ICONS[name]||"")+'</svg>';
  }

  const STATUS = [
    ["Confirmed","#2563EB","#E8F0FE"], ["In Production","#B45309","#FEF3E2"],
    ["Shipped","#15803D","#E7F6EC"], ["Closed","#6B7280","#F1F2F4"],
  ];

  let current = { module: "orders", sub: 0, fabOpen: false, sheetOpen: false };

  const pillRow = document.getElementById("pillRow");
  const fabItems = document.getElementById("fabItems");
  const fabWrap = document.getElementById("fabWrap");
  const scrim = document.getElementById("scrim");
  const cardList = document.getElementById("cardList");
  const moduleGrid = document.getElementById("moduleGrid");
  const moduleSheet = document.getElementById("moduleSheet");

  function renderPills() {
    const subs = MODULES[current.module].subs;
    pillRow.innerHTML = subs.map((s, i) => {
      const active = i === current.sub;
      return '<button data-sub="'+i+'" class="shrink-0 whitespace-nowrap rounded-full px-3.5 py-1.5 text-xs font-medium '+
        (active ? "bg-primary text-white" : "bg-slate-100 text-muted") + '">'+s.label+'</button>';
    }).join("");
    pillRow.querySelectorAll("button").forEach(b => b.onclick = () => {
      current.sub = +b.dataset.sub; current.fabOpen = false; render();
      // scroll active pill into view
      b.scrollIntoView({ behavior:"smooth", inline:"center", block:"nearest" });
    });
  }

  function renderFab() {
    const acts = MODULES[current.module].subs[current.sub].actions;
    fabItems.innerHTML = acts.map((a, i) => {
      const primary = i === 0;
      return '<div class="fab-item flex items-center gap-2" style="transition-delay:'+(current.fabOpen?(acts.length-1-i)*35:0)+'ms">'+
        '<span class="rounded-lg bg-white px-3 py-1.5 text-xs font-medium text-ink shadow-md border border-border">'+a+'</span>'+
        '<span class="h-11 w-11 rounded-full grid place-items-center shadow-md '+(primary?"bg-primary text-white":"bg-white text-primary border border-border")+'">'+
          '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 5v14M5 12h14"/></svg>'+
        '</span></div>';
    }).join("");
    fabWrap.className = (current.fabOpen ? "fab-open" : "fab-closed") +
      " absolute right-4 bottom-[84px] z-40 flex flex-col items-end gap-2.5";
    document.getElementById("fabIcon").innerHTML = current.fabOpen
      ? '<path stroke-linecap="round" d="M6 6l12 12M18 6L6 18"/>'
      : '<path stroke-linecap="round" d="M12 5v14M5 12h14"/>';
  }

  function renderContent() {
    const sub = MODULES[current.module].subs[current.sub];
    document.getElementById("topbarTitle").textContent = MODULES[current.module].label;
    document.getElementById("pageTitle").textContent = sub.label;
    document.getElementById("pageSub").textContent = MODULES[current.module].label + " · " + sub.actions.length + " quick action" + (sub.actions.length>1?"s":"");
    let rows = "";
    for (let i = 0; i < 6; i++) {
      const st = STATUS[i % STATUS.length];
      const code = current.module.slice(0,3).toUpperCase() + "-" + (2400 + i*7);
      rows += '<div class="rounded-xl bg-surface border border-border p-3.5">'+
        '<div class="flex items-center justify-between">'+
          '<span class="font-mono text-xs font-semibold text-primary">'+code+'</span>'+
          '<span class="rounded-full px-2 py-0.5 text-[10px] font-medium" style="color:'+st[1]+';background:'+st[2]+'">'+st[0]+'</span>'+
        '</div>'+
        '<div class="mt-1.5 text-sm font-medium text-ink">'+sub.label+' record '+(i+1)+'</div>'+
        '<div class="mt-0.5 flex items-center justify-between text-xs text-muted">'+
          '<span>Global Apparel Co.</span><span class="font-mono">'+(1200 - i*130)+' pcs</span>'+
        '</div></div>';
    }
    cardList.innerHTML = rows;
  }

  function renderSheet() {
    moduleGrid.innerHTML = Object.entries(MODULES).map(([key, m]) => {
      const active = key === current.module;
      return '<button data-mod="'+key+'" class="flex flex-col items-center gap-1.5 rounded-xl border p-3 '+
        (active ? "border-primary bg-primary-tint text-primary" : "border-border text-muted") + '">'+
        icon(m.icon) + '<span class="text-[11px] font-medium text-center leading-tight">'+m.label+'</span></button>';
    }).join("");
    moduleGrid.querySelectorAll("button").forEach(b => b.onclick = () => {
      current.module = b.dataset.mod; current.sub = 0; current.sheetOpen = false; current.fabOpen = false;
      render();
    });
  }

  function renderOverlays() {
    const anyOpen = current.fabOpen || current.sheetOpen;
    scrim.style.opacity = anyOpen ? "1" : "0";
    scrim.style.pointerEvents = anyOpen ? "auto" : "none";
    moduleSheet.style.transform = current.sheetOpen ? "translateY(0)" : "translateY(100%)";
  }

  function render() { renderPills(); renderFab(); renderContent(); renderSheet(); renderOverlays(); }

  document.getElementById("fab").onclick = () => { current.fabOpen = !current.fabOpen; current.sheetOpen = false; render(); };
  document.getElementById("modulesBtn").onclick = () => { current.sheetOpen = true; current.fabOpen = false; render(); };
  document.getElementById("sheetClose").onclick = () => { current.sheetOpen = false; render(); };
  scrim.onclick = () => { current.fabOpen = false; current.sheetOpen = false; render(); };

  render();
</script>
</body>
</html>
